<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Alexandrie Systems — Architecture · Conseil · Transition IA">
  <title>Alexandrie Systems</title>
  <desc>Image de partage social (1200×630) — Des systèmes pour les organisations qui refusent la dispersion.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&amp;family=Instrument+Serif:ital@1&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .h1{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:600;letter-spacing:-2px;fill:#0a0a0a}
      .h1-em{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;fill:#7326BB}
      .word{font-family:'Bricolage Grotesque','Inter',sans-serif;font-weight:700;letter-spacing:-1.8px;fill:#0a0a0a}
      .mono{font-family:'JetBrains Mono','Courier New',monospace;font-weight:500;letter-spacing:2.5px;fill:#0a0a0a;fill-opacity:.55}
    ]]></style>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(10,10,10,.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fond bone + grille subtile -->
  <rect width="1200" height="630" fill="#f4f0e8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow violet doux en haut à droite (accent diagonal) -->
  <circle cx="1100" cy="120" r="280" fill="#7326BB" opacity="0.06"/>

  <!-- Top-left : logo Alexandrie Systems (mark + wordmark) -->
  <g transform="translate(80,80) scale(0.45)">
    <polygon points="36.5,5 46.5,5 18.5,95 8.5,95" fill="#0a0a0a"/>
    <polygon points="53,5 64,5 92,95 81,95" fill="#7326BB"/>
    <text x="105" y="83" font-size="95" class="word">lexandrie Systems</text>
  </g>

  <!-- Filet de séparation typographique sous le logo -->
  <line x1="80" y1="160" x2="180" y2="160" stroke="#0a0a0a" stroke-width="1.5" opacity="0.4"/>

  <!-- Center : titre éditorial 3 lignes asymétriques -->
  <text x="80" y="290" font-size="72" class="h1">Des systèmes</text>
  <text x="140" y="372" font-size="72" class="h1">pour les organisations</text>
  <text x="80" y="454" font-size="72" class="h1">qui refusent la <tspan class="h1-em" font-size="80">dispersion</tspan>.</text>

  <!-- Bottom-left : signature service -->
  <text x="80" y="566" font-size="14" class="mono">ARCHITECTURE  ·  CONSEIL  ·  TRANSITION IA</text>

  <!-- Bottom-right : URL canonique -->
  <text x="1120" y="566" text-anchor="end" font-size="14" class="mono">backoffice.miragebleu.ch/alex</text>
</svg>
