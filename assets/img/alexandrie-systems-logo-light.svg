<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 100" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Alexandrie Systems">
  <title>Alexandrie Systems · Light variant</title>
  <desc>Variante pour fond sombre : mark lambda blanc + violet #7326BB, wordmark blanc.</desc>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&amp;display=swap');
      .as-wordmark{
        font-family:'Bricolage Grotesque','Inter','Helvetica Neue',Arial,sans-serif;
        font-weight:700;
        letter-spacing:-2.85px;
        fill:#f4f0e8;
      }
    ]]></style>
  </defs>
  <!-- Lambda mark : aile gauche bone, aile droite violet -->
  <g>
    <polygon points="36.5,5 46.5,5 18.5,95 8.5,95" fill="#f4f0e8"/>
    <polygon points="53,5 64,5 92,95 81,95" fill="#7326BB"/>
  </g>
  <!-- Wordmark "lexandrie Systems" en bone (#f4f0e8) -->
  <text x="105" y="83" font-size="95" class="as-wordmark">lexandrie Systems</text>
</svg>
